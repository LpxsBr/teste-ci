name: CI | Sync develop to approval

on:
  push:
    branches:
      - develop

permissions:
  contents: write

concurrency:
  group: sync-develop-approval
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        branch:
          - approval

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync approval
        run: |
          git fetch origin develop approval
          git checkout approval
          git reset --hard origin/develop
          git push origin approval --force-with-lease